name: Atualizar Dashboard de Tickets

on:
  schedule:
    # Roda a cada hora, de segunda a sexta, das 7h às 20h (horário de Brasília = UTC-3)
    - cron: "0 10-23 * * 1-5"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests pandas openpyxl

      - name: Buscar tickets do portal
        env:
          PORTAL_EMAIL: ${{ secrets.PORTAL_EMAIL }}
          PORTAL_SENHA: ${{ secrets.PORTAL_SENHA }}
        run: python fetch_tickets.py

      - name: Commitar dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tickets.json
          git diff --staged --quiet || git commit -m "chore: atualiza tickets [skip ci]"
          git push
